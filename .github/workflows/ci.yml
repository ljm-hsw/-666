name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows 2022 / MSVC
            os: windows-2022
            configure_args: -G "Visual Studio 17 2022" -A x64
          - name: macOS / Apple Clang
            os: macos-latest
            configure_args: -DCMAKE_BUILD_TYPE=Release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build ${{ matrix.configure_args }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
